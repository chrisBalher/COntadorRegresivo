<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Melody &#128064;</title>
    <link rel="stylesheet" href="contadorRegresivo.css">
</head>
<body>
    <div class="countdown-wrap">
        <p class="countdown-label">Cuenta regresiva</p>
        <p class="countdown-title">Sábado 13 de junio — 7:00 AM</p>
        <p class="countdown-subtitle" id="local-tz"></p>

        <div class="countdown-grid" id="countdown-grid">
            <div class="countdown-unit"><div class="countdown-number" id="days">--</div><div class="countdown-unit-label">Días</div></div>
            <div class="countdown-unit"><div class="countdown-number" id="hours">--</div><div class="countdown-unit-label">Horas</div></div>
            <div class="countdown-unit"><div class="countdown-number" id="minutes">--</div><div class="countdown-unit-label">Minutos</div></div>
            <div class="countdown-unit"><div class="countdown-number" id="seconds">--</div><div class="countdown-unit-label">Segundos</div></div>
        </div>

        <div class="progress-bar-wrap">
            <div class="progress-bar-bg">
                <div class="progress-bar-fill" id="progress-fill"></div>
            </div>
        </div>
    </div>

    <script src="contadorRegresivo.js"></script>
</body>
</html>
    
</body>
<script src="contadorRegresivo.js"></script>
</html>
