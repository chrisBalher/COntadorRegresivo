<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Melody 👀</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=Lato:wght@300;400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="contadorRegresivo.css">
</head>
<body>
    <div class="countdown-wrap">

        <div class="petals" id="petals"></div>

        <span class="heart-icon">♡</span>
        <p class="countdown-label">Cuenta regresiva para verte mi Amor Melody</p>
        <p class="countdown-title">Sábado 13 de junio — 7:00 AM</p>
        <p class="countdown-subtitle" id="local-tz"></p>

        <div class="countdown-grid" id="countdown-grid">
            <div class="countdown-unit">
                <div class="countdown-number" id="days">--</div>
                <div class="countdown-unit-label">Días</div>
            </div>
            <div class="countdown-unit">
                <div class="countdown-number" id="hours">--</div>
                <div class="countdown-unit-label">Horas</div>
            </div>
            <div class="countdown-unit">
                <div class="countdown-number" id="minutes">--</div>
                <div class="countdown-unit-label">Minutos</div>
            </div>
            <div class="countdown-unit">
                <div class="countdown-number" id="seconds">--</div>
                <div class="countdown-unit-label">Segundos</div>
            </div>
        </div>

        <div class="progress-bar-wrap">
            <div class="progress-bar-bg">
                <div class="progress-bar-fill" id="progress-fill"></div>
            </div>
            <p class="progress-note" id="progress-note"></p>
        </div>

    </div>

    <script src="contadorRegresivo.js"></script>
</body>
</html>
